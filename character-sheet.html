<body>
	
<header class="ve-mobile-sm__hidden page__header">
	<div class="container ve-flex-v-baseline">
		<h1 class="page__title ve-no-wrap ve-my-0" id="page__title">Character Sheet</h1>
		<p class="page__subtitle ve-no-wrap ve-my-0" id="page__subtitle">View your character sheet here, I suppose.</p>
	</div>
</header>

<nav class="container page__nav" id="navigation">
	<ul class="nav nav-pills page__nav-inner" id="navbar"></ul>
</nav>

<div class="sheet__page">

	<!-- Info Header -->
	<div class="sheet__box-info">
		<div class="sheet__row">
			<div class="sheet__col">
				<label>Name</label>
				<input style="text-align: center;" id="name" type="text">
			</div>

			<div class="sheet__col">
				<label>Species</label>
				<input style="text-align: center;" id="species" type="text">
			</div>
			
			<div class="sheet__col">
				<label>Class</label>
				<input style="text-align: center;" id="class" type="text">
			</div>

			<div class="sheet__col">
				<label>Subclass</label>
				<input style="text-align: center;" id="subclass" type="text">
			</div>

			<div class="sheet__col">
				<label>Background</label>
				<input style="text-align: center;" id="background" type="text">
			</div>


			<div class="sheet__col">
				<label>Level</label>
				<input id="level" type="number" min="1" max="20" value="1">
			</div>
		</div>
	</div>
	
	<!-- Body Row -->
	<div class="sheet__row">
		<!-- Stats -->
		<div class="sheet__col">
			<div class="sheet__box-stat">
				<div class="sheet__col">
					<label>STR</label>
					<div id="strBonus" class="sheet__dependant"></div>
					<input id="str" type="number" min="1" max="30" value="8">
				</div>
			</div>
		</div>
		<div class="sheet__col">
			<div class="sheet__box-stat">
				<div class="sheet__col">
					<label>DEX</label>
					<div id="dexBonus" class="sheet__dependant"></div>
					<input id="dex" type="number" min="1" max="30" value="8">
				</div>
			</div>
		</div>
		<div class="sheet__col">
			<div class="sheet__box-stat">
				<div class="sheet__col">
					<label>CON</label>
					<div id="conBonus" class="sheet__dependant"></div>
					<input id="con" type="number" min="1" max="30" value="8">
				</div>
			</div>
		</div>
		<div class="sheet__col">
			<div class="sheet__box-stat">
				<div class="sheet__col">
					<label>INT</label>
					<div id="intBonus" class="sheet__dependant"></div>
					<input id="int" type="number" min="1" max="30" value="8">
				</div>
			</div>
		</div>
		<div class="sheet__col">
			<div class="sheet__box-stat">
				<div class="sheet__col">
					<label>WIS</label>
					<div id="wisBonus" class="sheet__dependant"></div>
					<input id="wis" type="number" min="1" max="30" value="8">
				</div>
			</div>
		</div>
		<div class="sheet__col">
			<div class="sheet__box-stat">
				<div class="sheet__col">
					<label>CHA</label>
					<div id="chaBonus" class="sheet__dependant"></div>
					<input id="cha" type="number" min="1" max="30" value="8">
				</div>
				
			</div>
		</div>

		<div width="10"></div>

		<div class="sheet__col">
			<div class="sheet__box-stat">
				<label>PROFICIENCY</label>
				<div id="profBonus" class="sheet__dependant"></div>
				<label>BONUS</label>
			</div>
		</div>
		<div class="sheet__col">
			<div class="sheet__box-stat">
				<label>ARMOR</label>
				<div id="armorClass" class="sheet__dependant"></div>
				<label>CLASS</label>
			</div>
		</div>
	</div>
</div>
