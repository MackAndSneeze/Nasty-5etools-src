<body>
	
<header class="ve-mobile-sm__hidden page__header">
	<div class="container ve-flex-v-baseline">
		<h1 class="page__title ve-no-wrap ve-my-0" id="page__title">Character Sheet</h1>
		<p class="page__subtitle ve-no-wrap ve-my-0" id="page__subtitle">View your character sheet here, I suppose.</p>
	</div>
</header>

<nav class="container page__nav" id="navigation">
	<ul class="nav nav-pills page__nav-inner" id="navbar"></ul>
</nav>

<div class="sheet__page CharacterSheet">
	<div class="sheet__page-grid">
		<div class="sheet__box-info info">
			<div class="sheet__box-info-grid">
				<div class="sheet__box sheet__box-info-portrait port">
					<img src="King_Harkinian.webp" alt="My Boy" width="124" height="124">
				</div>
				<input style="text-align: center;" class="sheet__input-name ve-dnd-font name" id="name" type="text" placeholder="NAME">
				<input style="text-align: center;" class="sheet__input-details ve-dnd-font spec" id="species" type="text" placeholder="SPECIES">
				<input style="text-align: center;" class="sheet__input-details ve-dnd-font back" id="background" type="text" placeholder="BACKGROUND">
			</div>
		</div>

		<div class="sheet__box sheet__box-info class">
			<label class="ve-small">CLASS SUBCLASS LEVEL</label>
				<div><input id="level" type="number" min="1" max="20" value="1"></div>
				<div><label for="class">CLASS</label></div>

				<select name="class" id="class">
						<option value="artificer">Artificer</option>
						<option value="barbarian">Barbarian</option>
						<option value="bard">Bard</option>
						<option value="cleric">Cleric</option>
						<option value="druid">Druid</option>
						<option value="fighter">Fighter</option>
						<option value="monk">Monk</option>
						<option value="paladin">Paladin</option>
						<option value="ranger">Ranger</option>
						<option value="rogue">Rogue</option>
						<option value="sorcerer">Sorcerer</option>
						<option value="warlock">Warlock</option>
						<option value="wizard">Wizard</option>
				</select>
		</div>
		<div class="sheet__box sheet__box-roll str">
			<label class="ve-small">STRENGTH</label>
			<div>one</div>
			<div>two</div>
			<div>three</div>
		</div>
		<div class="sheet__box sheet__box-roll dex">
			<label class="ve-small">DEXTERITY</label>
		</div>
		<div class="sheet__box sheet__box-roll con">
			<label class="ve-small">CONSTITUTION</label>
		</div>
		<div class="sheet__box sheet__box-roll int">
			<label class="ve-small">INTELLIGENCE</label>
		</div>
		<div class="sheet__box sheet__box-roll wis">
			<label class="ve-small">WISDOM</label>
		</div>
		<div class="sheet__box sheet__box-roll cha">
			<label class="ve-small">CHARISMA</label>
		</div>
		<div class="sheet__box sheet__box-ninp prof">
			<label class="ve-small">PROFICIENCY BONUS</label>
			<div id="profBonus" class="sheet__dependant"></div>
		</div>
		<div class="sheet__box sheet__box-ninp speed">
			<label class="ve-small">WALKING SPEED</label>
		</div>
		<div class="sheet__box sheet__box-ninp init">
			<label class="ve-small">INITIATIVE</label>
		</div>
		<div class="sheet__box sheet__box-ninp ac">
			<label class="ve-small">ARMOR CLASS</label>
		</div>
		<div class="sheet__box sheet__box-insp insp">
			<label class="ve-small">HEROIC INSPIRATION</label>
		</div>
		<div class="sheet__box sheet__box-ninp hp">
			<label class="ve-small">HIT POINTS + LIFE</label>
		</div>
		<div class="sheet__box sheet__box-roll sav">
			<label class="ve-small">SAVES</label>
		</div>
		<div class="sheet__box sheet__box-roll sen">
			<label class="ve-small">SENSES</label>
		</div>
		<div class="sheet__box sheet__box-disp trn">
			<label class="ve-small">PROFICIENCIES + TRAINING</label>
		</div>
		<div class="sheet__box sheet__box-roll skl">
			<label class="ve-small">SKILLS</label>
		</div>
		<div class="sheet__box sheet__box-disp defcon">
			<label class="ve-small">DEFENSES AND CONDITIONS</label>
		</div>
		<div class="sheet__box sheet__box-ninp big">
			<label class="ve-small">EVERYTHING ELSE</label>
		</div>
		
	</div>
</div>
