<body>
	
<header class="ve-mobile-sm__hidden page__header">
	<div class="container ve-flex-v-baseline">
		<h1 class="page__title ve-no-wrap ve-my-0" id="page__title">Character Sheet</h1>
		<p class="page__subtitle ve-no-wrap ve-my-0" id="page__subtitle">View your character sheet here, I suppose.</p>
	</div>
</header>

<nav class="container page__nav" id="navigation">
	<ul class="nav nav-pills page__nav-inner" id="navbar"></ul>
</nav>

<div class="sheet__page CharacterSheet">
	<!-- Info Header -->
	<div class="sheet__box-info">
		<div class="sheet__row">
			<div class="view-col">
				<label>NAME</label>
				<input style="text-align: center;" id="name" type="text">
			</div>

			<div class="view-col">
				<label>SPECIES</label>
				<input style="text-align: center;" id="species" type="text">
			</div>

			<div class="view-col">
				<label>BACKGROUND</label>
				<input style="text-align: center;" id="background" type="text">
			</div>
			<div class="sheet__box-info">
				<div class="sheet__row">
					<div class="view-col">
						<label>CLASS</label>
						<input style="text-align: center;" id="class" type="text">
					</div>

					<div class="view-col">
						<label>SUBCLASS</label>
						<input style="text-align: center;" id="subclass" type="text">
					</div>

					<div class="view-col">
						<label>LEVEL</label>
						<input id="level" type="number" min="1" max="20" value="1">
					</div>
				</div>
			</div>
		</div>
	</div>
	
	<!-- Body Row -->
	<div class="sheet__row">
		<!-- Stats -->
		<div class="sheet__col">
			<span class="sheet__box">
				<label class="ve-small">STRENGTH</label>
				<div id="strBonus" class="sheet__dependant-stat"></div>
				<input id="str" class="sheet__input-stat" type="number" min="1" max="30" value="8">
			</span>
		</div>
		<div class="sheet__col">
			<span class="sheet__box">
				<label class="ve-small">DEXTERITY</label>
				<div id="dexBonus" class="sheet__dependant-stat"></div>
				<input id="dex" class="sheet__input-stat" type="number" min="1" max="30" value="8">
			</span>
		</div>
		<div class="sheet__col">
			<span class="sheet__box">
				<label class="ve-small">CONSTITUTION</label>
				<div id="conBonus" class="sheet__dependant-stat"></div>
				<input id="con" class="sheet__input-stat" type="number" min="1" max="30" value="8">
			</span>
		</div>
		<div class="sheet__col">
			<span class="sheet__box">
				<label class="ve-small">INTELLIGENCE</label>
				<div id="intBonus" class="sheet__dependant-stat"></div>
				<input id="int" class="sheet__input-stat" type="number" min="1" max="30" value="8">
			</span>
		</div>
		<div class="sheet__col">
			<span class="sheet__box">
				<label class="ve-small">WISDOM</label>
				<div id="wisBonus" class="sheet__dependant-stat"></div>
				<input id="wis" class="sheet__input-stat" type="number" min="1" max="30" value="8">
			</span>
		</div>
		<div class="sheet__col">
			<span class="sheet__box">
				<label class="ve-small">CHARISMA</label>
				<div id="chaBonus" class="sheet__dependant-stat"></div>
				<input id="cha" class="sheet__input-stat" type="number" min="1" max="30" value="8">

				<!-- <div class="sheet__box-abl">
					<span class="sheet__prof-btn ve-small">SAVING THROW</span>
					<span class="sheet__dependant-abl ve-w-20">2</span>
				</div>
				<div class="sheet__box-collapsible">
					<div class="sheet__box-abl">
						<span class="sheet__prof-btn ve-small">ANIMAL HANDLING</span>
						<span class="sheet__dependant-abl ve-w-20">+2</span>
					</div>
				</div>
				<div class="sheet__box-btn">
					<label class="ve-small">ABILITIES</label>
					<span class="caret"></span>
				</div> -->
			</span>
		</div>
		<div class="sheet__col">
			<span class="sheet__box">
				<label class="ve-small">PROFICIENCY</label>
				<div id="profBonus" class="sheet__dependant sheet__dependant-prof"></div>
				<label class="ve-small">BONUS</label>
			</span>
		</div>
		<div class="sheet__col">
			<span class="sheet__box">
				<label class="ve-small">WALKING</label>
				<div id="speed" class="sheet__dependant sheet__dependant-spd">30</div>
				<label class="ve-small">SPEED</label>
			</span>
		</div>
		<div class="sheet__col">
			<span class="sheet__box">
				<label class="ve-small">HEROIC</label>
				<div id="inspiration" class="sheet__dependant sheet__dependant-insp">_</div>
				<label class="ve-small">INSPIRATION</label>
			</span>
		</div>
		<div class="sheet__col ve-flex-3">
			<span class="sheet__box ">
				<label class="ve-small">HIT POINTS PLACEHOLDER</label>
			</span>
		</div>
	</div>

	<!-- Everything Else -->
	<div class="sheet__row">
		<!-- Saves and Such -->
		<div class="sheet__col">
			<span class="sheet__box">
				<label class="ve-small">SAVES PLACEHOLDER</label>
			</span>
			<span class="sheet__box">
				<label class="ve-small">SENSES PLACEHOLDER</label>
			</span>
			<span class="sheet__box">
				<label class="ve-small">PROFICIENCY & TRAINING PLACEHOLDER</label>
			</span>
		</div>
		<!-- Abilities -->
		<div class="sheet__col">
			<div class="sheet__row">
				<span class="sheet__box">
					<label class="ve-small">ABILITIES PLACEHOLDER</label>
				</span>
			</div>
		</div>
		<!-- The Big One -->
		 <div class="sheet__col ve-flex-2">
			<div class="sheet__row">
				<div class="sheet__col">
					<span class="sheet__box">
						<label class="ve-small">INITIATIVE</label>
						<div id="initBonus" class="sheet__dependant sheet__dependant-init">_</div>
						<label class="ve-small">BONUS</label>
					</span>
				</div>
				<div class="sheet__col">
					<span class="sheet__box">
						<label class="ve-small">ARMOR</label>
						<div id="armorClass" class="sheet__dependant sheet__dependant-init">_</div>
						<label class="ve-small">CLASS</label>
					</span>
				</div>
				<div class="sheet__col ve-flex-4">
					<span class="sheet__box">
						<label class="ve-small">DEFENSES AND CONDITIONS</label>
					</span>
				</div>
			</div>
			<div class="sheet__col">
				<span class="sheet__box">
					<label class="ve-small">BIG BAD BOX</label>
					<div></div>
					<label class="ve-small">-----------</label>
					<label class="ve-small">SUPERTEXT</label>
					<label class="ve-small">TEXT</label>
					<label class="ve-small">SUBTEXT</label>
				</span>
			</div>
		 </div>
	</div>
</div>

</body>
